<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Calendar body -->
  <rect x="96" y="120" width="320" height="296" rx="24" fill="#ffffff"/>
  <!-- Top bar (header strip) -->
  <rect x="96" y="120" width="320" height="64" rx="24" fill="#3B82F6"/>
  <rect x="96" y="160" width="320" height="24" fill="#3B82F6"/>
  <!-- Binder rings -->
  <rect x="140" y="96" width="16" height="48" rx="8" fill="#1e293b"/>
  <rect x="356" y="96" width="16" height="48" rx="8" fill="#1e293b"/>
  <!-- Date grid dots -->
  <g fill="#94a3b8">
    <circle cx="148" cy="232" r="10"/>
    <circle cx="208" cy="232" r="10"/>
    <circle cx="268" cy="232" r="10"/>
    <circle cx="328" cy="232" r="10"/>
    <circle cx="148" cy="292" r="10"/>
    <circle cx="208" cy="292" r="10"/>
    <circle cx="328" cy="292" r="10"/>
    <circle cx="148" cy="352" r="10"/>
    <circle cx="328" cy="352" r="10"/>
  </g>
  <!-- Highlighted event day -->
  <circle cx="268" cy="292" r="26" fill="#10B981"/>
  <circle cx="268" cy="292" r="10" fill="#ffffff"/>
  <!-- Remaining dots -->
  <g fill="#94a3b8">
    <circle cx="208" cy="352" r="10"/>
    <circle cx="268" cy="352" r="10"/>
  </g>
</svg>
